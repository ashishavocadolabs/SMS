databases:
  - name: sms-db
    plan: free
    databaseName: SMS

services:
  - type: web
    plan: free
    name: sms-app
    runtime: node
    buildCommand: npm install && npm run build && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
      - key: NODE_ENV
        value: production
